name: Trigger clawin.club Cloudflare rebuild

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-hook:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
    steps:
      - name: Skip when deploy hook is not configured
        if: ${{ env.CLOUDFLARE_DEPLOY_HOOK == '' }}
        run: echo 'CLOUDFLARE_DEPLOY_HOOK is not set; skipping Cloudflare trigger.'

      - name: Trigger Cloudflare Pages deploy hook
        if: ${{ env.CLOUDFLARE_DEPLOY_HOOK != '' }}
        run: |
          curl --fail --show-error --silent -X POST "$CLOUDFLARE_DEPLOY_HOOK"
