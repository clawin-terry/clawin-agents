<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Clawin Agents Brand Banner</title>
  <desc id="desc">A premium marketing banner for Clawin Agents with a stronger brand presence and cleaner layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08101E"/>
      <stop offset="0.5" stop-color="#0E1730"/>
      <stop offset="1" stop-color="#162657"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 150) rotate(34) scale(250 180)">
      <stop stop-color="#38BDF8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 420) rotate(28) scale(270 200)">
      <stop stop-color="#8B5CF6" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brandA" x1="878" y1="154" x2="1068" y2="344" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="brandB" x1="938" y1="214" x2="1130" y2="406" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="brandC" x1="838" y1="274" x2="1030" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="cta" x1="72" y1="438" x2="244" y2="494" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="stroke" x1="810" y1="118" x2="1212" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>

  <g opacity="0.16">
    <path d="M0 128.5H1280" stroke="white" stroke-opacity="0.12"/>
    <path d="M0 256.5H1280" stroke="white" stroke-opacity="0.07"/>
    <path d="M0 384.5H1280" stroke="white" stroke-opacity="0.07"/>
    <path d="M0 512.5H1280" stroke="white" stroke-opacity="0.12"/>
    <path d="M160.5 0V640" stroke="white" stroke-opacity="0.05"/>
    <path d="M320.5 0V640" stroke="white" stroke-opacity="0.05"/>
    <path d="M480.5 0V640" stroke="white" stroke-opacity="0.05"/>
    <path d="M640.5 0V640" stroke="white" stroke-opacity="0.05"/>
    <path d="M800.5 0V640" stroke="white" stroke-opacity="0.05"/>
    <path d="M960.5 0V640" stroke="white" stroke-opacity="0.05"/>
    <path d="M1120.5 0V640" stroke="white" stroke-opacity="0.05"/>
  </g>

  <circle cx="260" cy="150" r="228" fill="url(#glowBlue)"/>
  <circle cx="1030" cy="420" r="220" fill="url(#glowPurple)"/>

  <rect x="72" y="58" width="230" height="42" rx="21" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12"/>
  <circle cx="101" cy="79" r="7" fill="#38BDF8"/>
  <text x="122" y="86" fill="#DBE7FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">Clawin public catalog</text>

  <text x="72" y="214" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="-2.4">Clawin Agents</text>
  <text x="72" y="276" fill="#E7EEFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="32" font-weight="700">Install-ready OpenClaw agents</text>
  <text x="72" y="318" fill="#BFD0F0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="500">Industry. Role. Workflow.</text>
  <text x="72" y="384" fill="#94ABD6" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="500">A cleaner way to browse, inspect, and install your next OpenClaw starting point.</text>

  <g>
    <rect x="72" y="438" width="172" height="56" rx="18" fill="url(#cta)"/>
    <text x="113" y="472" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="800">1395</text>
    <text x="181" y="472" fill="#EEF4FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">agents</text>

    <rect x="260" y="438" width="152" height="56" rx="18" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.12"/>
    <text x="307" y="472" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="800">5</text>
    <text x="331" y="472" fill="#E8EEFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">industries</text>

    <rect x="428" y="438" width="196" height="56" rx="18" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.12"/>
    <text x="472" y="472" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="800">198</text>
    <text x="523" y="472" fill="#E8EEFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">role families</text>
  </g>

  <g>
    <rect x="822" y="116" width="392" height="408" rx="32" fill="white" fill-opacity="0.05" stroke="url(#stroke)"/>

    <g>
      <rect x="886" y="162" width="118" height="118" rx="28" fill="url(#brandA)"/>
      <rect x="1006" y="162" width="118" height="118" rx="28" fill="url(#brandB)"/>
      <rect x="946" y="282" width="118" height="118" rx="28" fill="url(#brandC)"/>

      <rect x="922" y="198" width="46" height="46" rx="14" fill="white" fill-opacity="0.18"/>
      <rect x="1042" y="198" width="46" height="46" rx="14" fill="white" fill-opacity="0.18"/>
      <rect x="982" y="318" width="46" height="46" rx="14" fill="white" fill-opacity="0.18"/>
    </g>

    <text x="876" y="448" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="800">Built for discovery</text>

    <g>
      <rect x="876" y="470" width="92" height="34" rx="17" fill="white" fill-opacity="0.08"/>
      <text x="901" y="492" fill="#EAF1FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" font-weight="700">catalog</text>

      <rect x="980" y="470" width="108" height="34" rx="17" fill="white" fill-opacity="0.08"/>
      <text x="1007" y="492" fill="#EAF1FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" font-weight="700">packages</text>

      <rect x="1100" y="470" width="84" height="34" rx="17" fill="white" fill-opacity="0.08"/>
      <text x="1126" y="492" fill="#EAF1FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" font-weight="700">CLI</text>
    </g>
  </g>

  <text x="72" y="574" fill="#90A7D4" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500">Website + GitHub + CLI install flow</text>
</svg>