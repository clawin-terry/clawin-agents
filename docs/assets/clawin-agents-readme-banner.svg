<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Clawin Agents README Banner</title>
  <desc id="desc">A cleaner, more spacious marketing banner for the Clawin Agents catalog.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="0.52" stop-color="#101A33"/>
      <stop offset="1" stop-color="#182653"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(298 170) rotate(38.8) scale(224 188)">
      <stop stop-color="#60A5FA" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 448) rotate(48.2) scale(218 170)">
      <stop stop-color="#8B5CF6" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="primaryPill" x1="70" y1="430" x2="230" y2="488" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="820" y1="122" x2="1188" y2="506" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.2"/>
      <stop offset="1" stop-color="white" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M0 128.5H1280" stroke="white" stroke-opacity="0.12"/>
    <path d="M0 256.5H1280" stroke="white" stroke-opacity="0.08"/>
    <path d="M0 384.5H1280" stroke="white" stroke-opacity="0.08"/>
    <path d="M0 512.5H1280" stroke="white" stroke-opacity="0.12"/>
    <path d="M160.5 0V640" stroke="white" stroke-opacity="0.06"/>
    <path d="M320.5 0V640" stroke="white" stroke-opacity="0.06"/>
    <path d="M480.5 0V640" stroke="white" stroke-opacity="0.06"/>
    <path d="M640.5 0V640" stroke="white" stroke-opacity="0.06"/>
    <path d="M800.5 0V640" stroke="white" stroke-opacity="0.06"/>
    <path d="M960.5 0V640" stroke="white" stroke-opacity="0.06"/>
    <path d="M1120.5 0V640" stroke="white" stroke-opacity="0.06"/>
  </g>

  <circle cx="298" cy="170" r="210" fill="url(#glowA)"/>
  <circle cx="1000" cy="448" r="182" fill="url(#glowB)"/>

  <g>
    <rect x="72" y="58" width="218" height="42" rx="21" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12"/>
    <circle cx="101" cy="79" r="7" fill="#60A5FA"/>
    <text x="122" y="86" fill="#D8E6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">Public OpenClaw catalog</text>
  </g>

  <g>
    <text x="72" y="224" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-2">Clawin Agents</text>
    <text x="72" y="282" fill="#E5EDFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="650">Install-ready OpenClaw agents</text>
    <text x="72" y="322" fill="#C4D3F1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="500">organized by industry, role, and workflow.</text>
    <text x="72" y="384" fill="#9EB2D9" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="400">Browse the catalog, inspect each package, and start from a stronger baseline.</text>
  </g>

  <g>
    <rect x="72" y="430" width="162" height="58" rx="18" fill="url(#primaryPill)"/>
    <text x="110" y="466" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="800">5</text>
    <text x="136" y="466" fill="#EEF4FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">industries</text>

    <rect x="250" y="430" width="190" height="58" rx="18" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.12"/>
    <text x="293" y="466" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="800">198</text>
    <text x="344" y="466" fill="#E7EEFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">role families</text>

    <rect x="456" y="430" width="230" height="58" rx="18" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.12"/>
    <text x="497" y="466" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="800">1395</text>
    <text x="558" y="466" fill="#E7EEFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">install-ready agents</text>
  </g>

  <g>
    <rect x="836" y="116" width="370" height="392" rx="30" fill="white" fill-opacity="0.06" stroke="url(#cardStroke)"/>
    <text x="874" y="174" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="800">Why Clawin stands out</text>
    <text x="874" y="208" fill="#9EB2D9" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500">A cleaner way to discover and start with OpenClaw agents.</text>

    <g>
      <rect x="874" y="244" width="294" height="60" rx="18" fill="white" fill-opacity="0.06"/>
      <circle cx="904" cy="274" r="7" fill="#60A5FA"/>
      <text x="926" y="266" fill="#F2F6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="750">Install-ready packages</text>
      <text x="926" y="289" fill="#AFC0E6" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="500">More than prompts and loose templates</text>
    </g>

    <g>
      <rect x="874" y="322" width="294" height="60" rx="18" fill="white" fill-opacity="0.06"/>
      <circle cx="904" cy="352" r="7" fill="#A78BFA"/>
      <text x="926" y="344" fill="#F2F6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="750">Structured discovery</text>
      <text x="926" y="367" fill="#AFC0E6" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="500">Browse by industry, role, and workflow</text>
    </g>

    <g>
      <rect x="874" y="400" width="294" height="60" rx="18" fill="white" fill-opacity="0.06"/>
      <circle cx="904" cy="430" r="7" fill="#34D399"/>
      <text x="926" y="422" fill="#F2F6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="750">Faster starting point</text>
      <text x="926" y="445" fill="#AFC0E6" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="500">Website + GitHub + CLI in one flow</text>
    </g>
  </g>

  <text x="72" y="576" fill="#91A7D3" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500">Website + public catalog + CLI install flow</text>
</svg>